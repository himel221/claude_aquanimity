    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Red Hat Display', Arial, sans-serif;
      background: var(--paper);
      color: var(--ink);
      overflow-x: hidden;
    }
    
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px;
    }
    
    @media (max-width: 768px) {
      .wrap {
        padding: 0 20px;
      }
    }
    
    .serif {
      font-family: 'Times New Roman', Georgia, serif;
    }
    
    .mono {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }
    
    .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--muted);
      text-transform: uppercase;
    }
    
    .img-frame {
      overflow: hidden;
      position: relative;
    }
    
    .img-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    
    .img-frame:hover img {
      transform: scale(1.02);
    }
    
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    
    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }
    
    #scrollBar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      background: var(--accent);
      z-index: 9999;
      width: 0%;
      transition: width 0.1s ease;
    }
    
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #FAF7F0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    
    /* CSS Variables for themes */
    :root {
      --bone: #F2EDE3;
      --bone-2: #ECE5D6;
      --paper: #FAF7F0;
      --ink: #0E1B2C;
      --ink-2: #1B2A3F;
      --muted: #5C6677;
      --rule: #D8D0BE;
      --accent: #1F6E7A;
      --accent-2: #4FA0AC;
      --accent-soft: #BFD4D5;
      --bubbleHi: #A8D0D6;
      --bubbleMid: #5FA0AC;
      --bubbleLo: #1F6E7A;
      --bubbleHalo: #BFD4D5;
    }
  </style>
